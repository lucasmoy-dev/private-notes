<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keep Mesh - Private Decentralized Notes</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#202124">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2965/2965358.png">

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Local Components/Logic -->
    <script src="./crypto-layer.js"></script>
    <script src="./database.js"></script>
    <script src="./mesh-engine.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-dark: #202124;
            --bg-light: #ffffff;
            --text-dark: #e8eaed;
            --text-light: #202124;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            transition: all 0.3s ease;
            overscroll-behavior-y: none;
            margin: 0;
        }

        body.light-theme {
            background: var(--bg-light);
            color: var(--text-light);
        }

        .note-card {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            will-change: transform, box-shadow;
        }

        body.light-theme .note-card {
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .note-card:hover {
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.6), 0 2px 6px 2px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        body.light-theme .note-card:hover {
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
        }

        /* Note Colors */
        .note-color-default {
            background: transparent;
        }

        .note-color-red {
            background: #5c2b29;
            color: #f28b82;
        }

        .note-color-orange {
            background: #614a19;
            color: #fbbc04;
        }

        .note-color-yellow {
            background: #635d19;
            color: #fff475;
        }

        .note-color-green {
            background: #345920;
            color: #ccff90;
        }

        .note-color-teal {
            background: #16504b;
            color: #a7ffeb;
        }

        .note-color-blue {
            background: #2d555e;
            color: #cbf0f8;
        }

        .note-color-darkblue {
            background: #1e3a5f;
            color: #aecbfa;
        }

        .note-color-purple {
            background: #42275e;
            color: #d7aefb;
        }

        .note-color-pink {
            background: #5b2245;
            color: #fdcfe8;
        }

        .note-color-brown {
            background: #442f19;
            color: #e6c9a8;
        }

        .note-color-gray {
            background: #3c3f43;
            color: #e8eaed;
        }

        body.light-theme .note-color-red {
            background: #f28b82;
            color: #202124;
        }

        body.light-theme .note-color-orange {
            background: #fbbc04;
            color: #202124;
        }

        body.light-theme .note-color-yellow {
            background: #fff475;
            color: #202124;
        }

        body.light-theme .note-color-green {
            background: #ccff90;
            color: #202124;
        }

        body.light-theme .note-color-teal {
            background: #a7ffeb;
            color: #202124;
        }

        body.light-theme .note-color-blue {
            background: #cbf0f8;
            color: #202124;
        }

        body.light-theme .note-color-darkblue {
            background: #aecbfa;
            color: #202124;
        }

        body.light-theme .note-color-purple {
            background: #d7aefb;
            color: #202124;
        }

        body.light-theme .note-color-pink {
            background: #fdcfe8;
            color: #202124;
        }

        body.light-theme .note-color-brown {
            background: #e6c9a8;
            color: #202124;
        }

        body.light-theme .note-color-gray {
            background: #e8eaed;
            color: #202124;
        }

        .masonry {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            grid-auto-rows: 10px;
            gap: 12px;
        }

        .animate-pop {
            animation: pop 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes pop {
            from {
                opacity: 0.5;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.2);
            border-radius: 4px;
        }

        .glass {
            background: rgba(32, 33, 36, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        body.light-theme .glass {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- UI COMPONENTS ---

        const Icon = ({ name, size = 20, className = "", onClick, style = {} }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}
                style={{ width: size, height: size, cursor: onClick ? 'pointer' : 'default', ...style }}
                onClick={onClick} />;
        };

        const NoteCard = ({ note, onEdit, onDelete, onTogglePin, onToggleCheck }) => {
            const spanRef = useRef(15);
            useEffect(() => {
                let contentLen = (note.title?.length || 0);
                if (note.type === 'checklist' && note.items) contentLen += note.items.length * 30;
                else contentLen += (note.content?.length || 0);
                const calculated = Math.ceil(contentLen / 20) + 4;
                spanRef.current = Math.max(calculated, 10);
            }, [note]);

            const visibleItems = (note.items || []).slice(0, 8);
            const remaining = Math.max(0, (note.items || []).length - 8);

            return (
                <div className={`note-card note-color-${note.color || 'default'} group relative rounded-xl p-4 flex flex-col space-y-2 cursor-pointer break-inside-avoid shadow-sm`}
                    style={{ gridRowEnd: `span ${spanRef.current}` }}
                    onClick={() => onEdit(note)}>
                    <div className="flex justify-between items-start">
                        {note.title && <h3 className="font-bold text-lg leading-snug w-full pr-6">{note.title}</h3>}
                        <button className="absolute top-3 right-3 p-1.5 rounded-full opacity-0 group-hover:opacity-100 hover:bg-black/10 transition-opacity" onClick={e => { e.stopPropagation(); onTogglePin(note); }}>
                            <Icon name="pin" size={16} className={note.pinned ? "fill-current text-indigo-400" : "text-gray-400"} />
                        </button>
                    </div>
                    <div className="text-sm leading-relaxed">
                        {note.type === 'checklist' ? (
                            <div className="space-y-1">
                                {visibleItems.map((item, idx) => (
                                    <div key={idx} className="flex items-start gap-2" onClick={e => e.stopPropagation()}>
                                        <div className={`mt-0.5 min-w-[14px] h-[14px] border rounded-sm flex items-center justify-center cursor-pointer transition-colors ${item.checked ? 'bg-current border-transparent opacity-60' : 'border-current opacity-40'}`} onClick={() => onToggleCheck(note.id, idx)}>
                                            {item.checked && <Icon name="check" size={10} className="stroke-[4]" />}
                                        </div>
                                        <span className={item.checked ? 'line-through opacity-50' : ''}>{item.text}</span>
                                    </div>
                                ))}
                                {remaining > 0 && <div className="text-xs opacity-50 pl-6">+ {remaining} more items</div>}
                            </div>
                        ) : <p className="whitespace-pre-wrap">{note.content}</p>}
                    </div>
                    {note.labels?.length > 0 && (
                        <div className="flex flex-wrap gap-1 pt-1">
                            {note.labels.map(L => <span key={L} className="px-2 py-0.5 bg-black/5 dark:bg-black/20 rounded-full text-[10px] font-bold uppercase tracking-wider opacity-60">{L}</span>)}
                        </div>
                    )}
                </div>
            );
        };

        const Sidebar = ({ isOpen, onClose, labels, selectedLabel, onSelectLabel, isLightMode, onAddLabel, deferredPrompt, onInstall }) => {
            const [newLabel, setNewLabel] = useState('');
            return (
                <React.Fragment>
                    <div className={`fixed inset-0 bg-black/50 z-[100] transition-opacity duration-300 ${isOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={onClose} />
                    <div className={`fixed top-0 left-0 bottom-0 w-72 ${isLightMode ? 'bg-white' : 'bg-[#202124]'} z-[101] transform transition-transform duration-300 ${isOpen ? 'translate-x-0' : '-translate-x-full'} shadow-2xl flex flex-col`}>
                        <div className="p-6 border-b border-white/5 flex items-center justify-between">
                            <span className="font-bold text-xl tracking-tight">Menú</span>
                            <button onClick={onClose} className="p-2 hover:bg-black/5 rounded-full"><Icon name="x" size={20} /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto py-4">
                            <div className={`px-6 py-3 flex items-center gap-4 cursor-pointer hover:bg-black/5 border-l-4 ${!selectedLabel ? 'border-indigo-500 bg-indigo-500/10' : 'border-transparent'}`} onClick={() => { onSelectLabel(null); onClose(); }}>
                                <Icon name="lightbulb" size={20} /> <span className="font-medium">Notes</span>
                            </div>
                            {labels.map(l => (
                                <div key={l} className={`px-6 py-3 flex items-center gap-4 cursor-pointer hover:bg-black/5 border-l-4 ${selectedLabel === l ? 'border-indigo-500 bg-indigo-500/10' : 'border-transparent'}`} onClick={() => { onSelectLabel(l); onClose(); }}>
                                    <Icon name="tag" size={20} /> <span className="font-medium truncate">{l}</span>
                                </div>
                            ))}
                            <div className="px-6 py-3 border-t border-white/10 mt-2">
                                <div className="text-xs text-gray-500 mb-2 font-bold uppercase opacity-60">Labels</div>
                                <div className="flex gap-2">
                                    <input className="bg-transparent border-b border-white/10 w-full py-1 text-sm outline-none focus:border-indigo-500" placeholder="New label" value={newLabel} onChange={e => setNewLabel(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && newLabel.trim()) { onAddLabel(newLabel.trim()); setNewLabel(''); } }} />
                                    <button onClick={() => { if (newLabel.trim()) { onAddLabel(newLabel.trim()); setNewLabel(''); } }} className="p-1 hover:bg-black/10 rounded-full"><Icon name="plus" size={18} /></button>
                                </div>
                            </div>
                        </div>
                        {deferredPrompt && (
                            <div className="p-6 border-t border-white/5 bg-indigo-500/5">
                                <button onClick={() => { onInstall(); onClose(); }} className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all">
                                    <Icon name="download" size={18} /> <span>Install App</span>
                                </button>
                            </div>
                        )}
                    </div>
                </React.Fragment>
            );
        };

        const SettingsModal = ({ isOpen, onClose, isLightMode, toggleTheme, isSyncActive, toggleSync, vaultName, setVaultName, peers, localLabel, onExport, onImport }) => {
            const [view, setView] = useState('MAIN');
            const [tempName, setTempName] = useState(vaultName);
            const [tempPass, setTempPass] = useState(localStorage.getItem('mesh_vault_pass') || '');
            const [tempLabel, setTempLabel] = useState(localLabel);
            const [pendingEncConfig, setPendingEncConfig] = useState(Database.config || { storageAlgo: 'NONE', storageKey: '', syncAlgo: 'NONE', syncKey: '' });
            const [resetPhrase, setResetPhrase] = useState('');

            useEffect(() => {
                if (isOpen) {
                    setPendingEncConfig(Database.config || { storageAlgo: 'NONE', storageKey: '', syncAlgo: 'NONE', syncKey: '' });
                }
            }, [isOpen]);

            if (!isOpen) return null;

            const applyEncryption = () => { Database.configure(pendingEncConfig); alert("Applied."); };
            const handleConnect = () => { Database.setNodeLabel(tempLabel); setVaultName(tempName); toggleSync(true, tempName, tempPass); };
            const handleReset = () => { if (resetPhrase.toLowerCase() === 'reset') { localStorage.clear(); window.location.reload(); } };

            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md" onClick={onClose}>
                    <div className="glass max-w-md w-full rounded-[2rem] border border-white/10 shadow-3xl overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-6 border-b border-white/5 flex items-center justify-between">
                            <h2 className="text-xl font-bold">{view === 'MAIN' ? 'Settings' : 'Back'}</h2>
                            <button onClick={view === 'MAIN' ? onClose : () => setView('MAIN')} className="p-2 hover:bg-white/10 rounded-full">
                                <Icon name={view === 'MAIN' ? "x" : "arrow-left"} size={20} />
                            </button>
                        </div>
                        <div className="p-6">
                            {view === 'MAIN' && (
                                <div className="space-y-4">
                                    <div className="p-4 bg-white/5 rounded-2xl flex items-center justify-between cursor-pointer" onClick={toggleTheme}>
                                        <div className="flex items-center gap-3"><Icon name={isLightMode ? "sun" : "moon"} /> Appearance</div>
                                        <div className={`w-10 h-5 rounded-full relative ${isLightMode ? 'bg-indigo-500' : 'bg-gray-600'}`}>
                                            <div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition-all ${isLightMode ? 'left-5.5' : 'left-0.5'}`} />
                                        </div>
                                    </div>
                                    {['SYNC', 'SECURITY', 'DATA', 'RESET'].map(v => (
                                        <div key={v} className="p-4 bg-white/5 rounded-2xl flex items-center justify-between cursor-pointer" onClick={() => setView(v)}>
                                            <span className="capitalize">{v.toLowerCase()}</span> <Icon name="chevron-right" size={16} />
                                        </div>
                                    ))}
                                </div>
                            )}
                            {view === 'SECURITY' && (
                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <select className="bg-black/20 p-3 rounded-xl border border-white/5 text-sm outline-none" value={pendingEncConfig.storageAlgo} onChange={e => setPendingEncConfig({ ...pendingEncConfig, storageAlgo: e.target.value })}>
                                            <option value="NONE">No Encryption</option>
                                            <option value="AES">AES-256</option>
                                        </select>
                                        <input type="password" placeholder="Key" className="bg-black/20 p-3 rounded-xl border border-white/5 text-sm" value={pendingEncConfig.storageKey} onChange={e => setPendingEncConfig({ ...pendingEncConfig, storageKey: e.target.value })} />
                                    </div>
                                    <button onClick={applyEncryption} className="w-full py-3 bg-indigo-600 rounded-xl font-bold">Apply Changes</button>
                                </div>
                            )}
                            {view === 'SYNC' && (
                                <div className="space-y-4">
                                    <input className="w-full bg-black/20 p-3 rounded-xl border border-white/5" placeholder="Your Label" value={tempLabel} onChange={e => setTempLabel(e.target.value)} />
                                    <input className="w-full bg-black/20 p-3 rounded-xl border border-white/5" placeholder="Vault Name" value={tempName} onChange={e => setTempName(e.target.value)} disabled={isSyncActive} />
                                    <button onClick={isSyncActive ? () => toggleSync(false) : handleConnect} className={`w-full py-3 rounded-xl font-bold ${isSyncActive ? 'bg-red-500/20 text-red-400' : 'bg-indigo-600'}`}>
                                        {isSyncActive ? 'Disconnect' : 'Connect'}
                                    </button>
                                </div>
                            )}
                            {view === 'DATA' && (
                                <div className="space-y-3">
                                    <button onClick={onExport} className="w-full py-3 bg-white/5 rounded-xl border border-white/5">Export JSON</button>
                                    <div className="relative">
                                        <button className="w-full py-3 bg-white/5 rounded-xl border border-white/5">Import JSON</button>
                                        <input type="file" accept=".json" onChange={onImport} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    </div>
                                </div>
                            )}
                            {view === 'RESET' && (
                                <div className="space-y-4">
                                    <p className="text-xs text-red-400">Type "reset" to confirm deletion of ALL data.</p>
                                    <input className="w-full bg-black/20 p-3 rounded-xl border border-red-500/20" value={resetPhrase} onChange={e => setResetPhrase(e.target.value)} placeholder="reset" />
                                    <button onClick={handleReset} className="w-full py-3 bg-red-600 rounded-xl font-bold">Factory Reset</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---

        const App = () => {
            const [notes, setNotes] = useState([]);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [selectedLabel, setSelectedLabel] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [isLightMode, setIsLightMode] = useState(localStorage.getItem('theme') === 'light');
            const [isSyncActive, setIsSyncActive] = useState(localStorage.getItem('theme_sync') === 'true');
            const [vaultName, setVaultName] = useState(localStorage.getItem('mesh_vault_name') || 'MainVault');
            const [isCreating, setIsCreating] = useState(false);
            const [peers, setPeers] = useState([]);
            const [deferredPrompt, setDeferredPrompt] = useState(null);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); setDeferredPrompt(e); });
                Database.init(vaultName, () => setNotes(Database.getAll()));
                if (localStorage.getItem('mesh_sync_active') === 'true') {
                    toggleSync(true, vaultName, localStorage.getItem('mesh_vault_pass'));
                }
            }, []);

            useEffect(() => {
                document.body.className = isLightMode ? 'light-theme' : '';
            }, [isLightMode]);

            const toggleSync = (active, name, pass) => {
                if (active) {
                    Hub.initialize(name, pass, () => {
                        setPeers(Array.from(Hub.conns.entries()).map(([id, info]) => ({ id, label: info.label })));
                        setIsSyncActive(true);
                        localStorage.setItem('mesh_sync_active', 'true');
                    });
                } else {
                    if (Hub.peer) Hub.peer.destroy();
                    setIsSyncActive(false);
                    localStorage.setItem('mesh_sync_active', 'false');
                }
            };

            const upsert = (data) => {
                Database.upsert(data.id || Date.now(), data);
                if (isSyncActive) Hub.broadcast();
                setNotes(Database.getAll());
            };

            const filtered = useMemo(() => {
                return notes.filter(n => {
                    const matchLabel = !selectedLabel || n.labels?.includes(selectedLabel);
                    const matchSearch = !searchQuery || JSON.stringify(n).toLowerCase().includes(searchQuery.toLowerCase());
                    return matchLabel && matchSearch;
                });
            }, [notes, selectedLabel, searchQuery]);

            return (
                <div className="min-h-screen pt-20 pb-10">
                    <header className="h-16 px-4 flex items-center gap-2 border-b border-white/5 fixed top-0 left-0 right-0 z-40 glass">
                        <button onClick={() => setIsSidebarOpen(true)} className="p-2 hover:bg-black/10 rounded-full shrink-0"><Icon name="menu" /></button>

                        <div className="flex items-center gap-2 shrink-0">
                            <div className="w-8 h-8 bg-yellow-400 rounded-lg flex items-center justify-center text-yellow-900 shadow-sm">
                                <Icon name="sticky-note" size={18} />
                            </div>
                            <h1 className="text-lg font-bold truncate hidden lg:block">{selectedLabel || 'Keep Mesh'}</h1>
                        </div>

                        <div className="bg-gray-500/10 focus-within:bg-gray-500/20 rounded-lg flex-1 max-w-xl flex items-center px-3 h-10 transition-colors mx-1 min-w-0">
                            <Icon name="search" size={16} className="text-gray-400 shrink-0" />
                            <input className="bg-transparent border-none outline-none px-2 text-sm flex-1 min-w-0" placeholder="Search" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                        </div>

                        <button onClick={() => setShowSettings(true)} className="p-2 hover:bg-black/10 rounded-full shrink-0"><Icon name="settings" /></button>
                    </header>

                    <Sidebar isOpen={isSidebarOpen} onClose={() => setIsSidebarOpen(false)} labels={[...new Set(notes.flatMap(n => n.labels || []))]}
                        selectedLabel={selectedLabel} onSelectLabel={setSelectedLabel} isLightMode={isLightMode} onAddLabel={() => { }}
                        deferredPrompt={deferredPrompt} onInstall={() => deferredPrompt.prompt()} />

                    <main className="max-w-4xl mx-auto px-4 space-y-6">
                        <div className="glass p-4 rounded-xl border border-white/10" onClick={() => { if (!isCreating) setIsCreating(true); }}>
                            {!isCreating ? <div className="text-sm opacity-50">Take a note...</div> : (
                                <div className="space-y-4">
                                    <input className="w-full bg-transparent font-bold text-lg outline-none" placeholder="Title" id="n-title" />
                                    <textarea className="w-full bg-transparent outline-none text-sm min-h-[100px]" placeholder="Content" id="n-content" />
                                    <div className="flex justify-end gap-2">
                                        <button onClick={() => setIsCreating(false)}>Cancel</button>
                                        <button className="px-4 py-2 bg-indigo-600 rounded-lg font-bold" onClick={() => {
                                            upsert({ title: document.getElementById('n-title').value, content: document.getElementById('n-content').value });
                                            setIsCreating(false);
                                        }}>Save</button>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="masonry">
                            {filtered.map(n => <NoteCard key={n.id} note={n} onEdit={() => { }} onTogglePin={() => { }} onToggleCheck={() => { }} />)}
                        </div>
                    </main>

                    <SettingsModal isOpen={showSettings} onClose={() => setShowSettings(false)} isLightMode={isLightMode}
                        toggleTheme={() => setIsLightMode(!isLightMode)} isSyncActive={isSyncActive} toggleSync={toggleSync}
                        vaultName={vaultName} setVaultName={setVaultName} peers={peers} localLabel={Database.nodeLabel}
                        onExport={() => alert(JSON.stringify(Database.getPayload()))} onImport={() => { }} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
