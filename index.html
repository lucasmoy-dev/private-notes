<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Notes - Private Decentralized Notes</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#202124">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2965/2965358.png">

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <!-- Estilos Separados (Esto funciona perfecto en file://) -->
    <link rel="stylesheet" href="src/css/styles.css">

    <!-- Lógica de Núcleo (Organizada en src/js/) -->
    <script src="src/js/crypto-layer.js"></script>
    <script src="src/js/database.js"></script>
    <script src="src/js/mesh-engine.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const NOTE_COLORS = [
            { id: 'default', label: 'Default' }, { id: 'red', label: 'Red' }, { id: 'orange', label: 'Orange' },
            { id: 'yellow', label: 'Yellow' }, { id: 'green', label: 'Green' }, { id: 'teal', label: 'Teal' },
            { id: 'blue', label: 'Blue' }, { id: 'darkblue', label: 'Dark Blue' }, { id: 'purple', label: 'Purple' },
            { id: 'pink', label: 'Pink' }, { id: 'brown', label: 'Brown' }, { id: 'gray', label: 'Gray' }
        ];

        const formatDate = (ts) => {
            const d = new Date(parseInt(ts));
            const pad = (n) => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}, ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        };

        // --- COMPONENTES UI ---

        const Icon = ({ name, size = 20, className = "", onClick, style = {} }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}
                style={{ width: size, height: size, ...style }}
                onClick={onClick} />;
        };

        const ColorPickerBtn = ({ selected, onSelect, colors }) => {
            const [show, setShow] = useState(false);
            return (
                <div className="relative">
                    <button className={`p-1.5 rounded-full border border-black/10 note-color-${selected}`} onClick={() => setShow(!show)}>
                        <Icon name="palette" size={16} />
                    </button>
                    {show && (
                        <div className="absolute bottom-full left-0 mb-2 p-2 glass rounded-xl grid grid-cols-4 gap-2 z-[60] animate-pop shadow-xl w-40" onMouseLeave={() => setShow(false)}>
                            {colors.map(c => (
                                <button key={c.id} onClick={() => { onSelect(c.id); setShow(false); }} className={`w-6 h-6 rounded-full border border-black/10 note-color-${c.id} ${selected === c.id ? 'ring-2 ring-indigo-500' : ''}`} title={c.label} />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const LabelSelector = ({ currentLabels, onToggle, allLabels }) => {
            const [show, setShow] = useState(false);
            return (
                <div className="relative">
                    <button className="flex items-center gap-1 text-xs px-2 py-1.5 rounded-full bg-black/5 hover:bg-black/10 transition-colors" onClick={() => setShow(!show)}>
                        <Icon name="tag" size={14} /> <span>Labels</span>
                    </button>
                    {show && (
                        <div className="absolute bottom-full left-0 mb-2 w-48 glass rounded-xl p-2 z-[60] animate-pop border border-black/5 shadow-xl" onMouseLeave={() => setShow(false)}>
                            <div className="max-h-40 overflow-y-auto custom-scrollbar space-y-1">
                                {allLabels.map(l => (
                                    <div key={l} className="flex items-center gap-2 px-2 py-1.5 hover:bg-black/10 rounded cursor-pointer" onClick={() => onToggle(l)}>
                                        <div className={`w-3.5 h-3.5 rounded-sm border flex items-center justify-center ${currentLabels.includes(l) ? 'bg-indigo-500 border-indigo-500' : 'border-gray-500'}`}>
                                            {currentLabels.includes(l) && <Icon name="check" size={10} className="text-white" />}
                                        </div>
                                        <span className="text-sm truncate select-none">{l}</span>
                                    </div>
                                ))}
                                {allLabels.length === 0 && <div className="text-xs text-gray-500 p-2 text-center">No labels created</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const TEXT_COLORS = [
            '#ef4444', '#f59e0b', '#10b981', '#06b6d4', '#3b82f6', '#6366f1', '#8b5cf6', '#d946ef', '#ec4899',
            '#f43f5e', '#fb923c', '#84cc16', '#14b8a6', '#0ea5e9', '#4f46e5', '#a855f7', '#d946ef', '#64748b',
            '#475569', '#334155', 'inherit'
        ];

        const TextColorPicker = ({ onSelect }) => {
            const [show, setShow] = useState(false);
            return (
                <div className="relative flex items-center">
                    <button className="toolbar-btn" onClick={() => setShow(!show)} title="Text Color">
                        <Icon name="baseline" size={14} />
                    </button>
                    {show && (
                        <div className="absolute top-full left-0 mt-2 glass rounded-xl z-[70] shadow-2xl border border-white/10 text-color-grid" onMouseLeave={() => setShow(false)}>
                            {TEXT_COLORS.map(c => (
                                <button key={c} onClick={() => { onSelect('foreColor', c); setShow(false); }}
                                    className="text-color-item"
                                    style={{ backgroundColor: c === 'inherit' ? 'transparent' : c }}>
                                    {c === 'inherit' && <Icon name="slash" size={12} className="opacity-40" />}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const EMOJIS = [
            '😀', '😃', '😄', '😁', '😅', '😂', '🤣', '😊', '😇', '🙂', '🙃', '😉', '😌', '😍', '🥰', '😘',
            '😗', '😙', '😚', '😋', '😛', '😝', '😜', '🤪', '🤨', '🧐', '🤓', '😎', '🤩', '🥳', '😏', '😒',
            '😞', '😔', '😟', '😕', '🙁', '☹️', '😣', '😖', '😫', '😩', '🥺', '😢', '😭', '😤', '😠', '😡',
            '🤬', '🤯', '😳', '🥵', '🥶', '😱', '😨', '😰', '😥', '😓', '🤗', '🤔', '🤭', '🤫', '🤥', '😶',
            '😐', '😑', '😬', '🙄', '😯', '😦', '😧', '😮', '😲', '🥱', '😴', '🤤', '😪', '😵', '🤐', '🥴',
            '🤢', '🤮', '🤧', '🤨', '🧐', '🤓', '😎', '🤩', '🥳', '😏', '😒', '😞', '😔', '😟', '😕', '🙁',
            '👍', '👎', '👌', '✌️', '🤞', '🤟', '🤘', '🤙', '👈', '👉', '👆', '🖕', '👇', '☝️', '✋', '🤚',
            '🖐', '🖖', '👋', '🤙', '💪', '🦾', '🖕', '🙏', '🤲', '🤝', '👏', '🙌', '👐', '🤏', '🤏', '🤌',
            '🔥', '✨', '💡', '📌', '✅', '❌', '📅', '🎉', '🚀', '🔒', '🔑', '❤️', '💔', '❣️', '💕', '💞',
            '💓', '💗', '💖', '💘', '💝', '💟', '☮️', '✝️', '☪️', '🕉', '☸️', '✡️', '🔯', '🕎', '☯️', '☦️'
        ];

        const EmojiPicker = ({ onSelect }) => {
            const [show, setShow] = useState(false);
            return (
                <div className="relative flex items-center">
                    <button className="toolbar-btn" onClick={() => setShow(!show)} title="Insert Emoji">
                        <Icon name="smile" size={14} />
                    </button>
                    {show && (
                        <div className="absolute top-full left-0 mt-2 p-2 glass rounded-2xl grid grid-cols-6 gap-1 z-[70] shadow-2xl border border-white/10 w-[240px] max-h-[300px] overflow-y-auto custom-scrollbar animate-pop" onMouseLeave={() => setShow(false)}>
                            {EMOJIS.map(e => (
                                <button key={e} onClick={() => { onSelect(e); setShow(false); }} className="w-9 h-9 flex items-center justify-center hover:bg-white/10 rounded-xl text-lg transition-all hover:scale-110 shrink-0">
                                    {e}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const QRCodeView = ({ data }) => {
            const qrRef = useRef(null);
            useEffect(() => {
                if (qrRef.current && window.QRCode) {
                    qrRef.current.innerHTML = '';
                    new QRCode(qrRef.current, {
                        text: data,
                        width: 160,
                        height: 160,
                        colorDark: "#6366f1",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            }, [data]);
            return (
                <div className="flex flex-col items-center gap-3 p-4 bg-white rounded-2xl shadow-xl border border-indigo-500/20">
                    <div ref={qrRef} className="p-2 bg-white rounded-lg" />
                    <p className="text-[10px] font-bold text-indigo-600 uppercase tracking-widest text-center">Scan to Sync this Device</p>
                </div>
            );
        };

        const RichToolbar = ({ onFormat, onEmoji, onTypeChange }) => (
            <div className={`flex items-center gap-1 p-1 bg-black/5 rounded-lg mb-2`}>
                <button className="toolbar-btn" title="Add Checklist Item" onClick={() => onTypeChange('toggle-checklist')}><Icon name="list-checks" size={14} /></button>
                <div className="w-px h-4 bg-black/10 mx-1" />
                <button className="toolbar-btn" title="Bold" onClick={() => onFormat('bold')}><Icon name="bold" size={14} /></button>
                <button className="toolbar-btn" title="Italic" onClick={() => onFormat('italic')}><Icon name="italic" size={14} /></button>
                <button className="toolbar-btn" title="Underline" onClick={() => onFormat('underline')}><Icon name="underline" size={14} /></button>
                <TextColorPicker onSelect={onFormat} />
                <div className="w-px h-4 bg-black/10 mx-1" />
                <EmojiPicker onSelect={onEmoji} />
            </div>
        );

        // --- COMPONENTES PRINCIPALES ---

        const NoteCreator = ({ isCreating, setIsCreating, isLightMode, onSave, allLabels, selectedLabel }) => {
            const [title, setTitle] = useState('');
            const contentRef = useRef(null);
            const [items, setItems] = useState([]);
            const [color, setColor] = useState('default');
            const [labels, setLabels] = useState([]);

            useEffect(() => {
                if (isCreating && selectedLabel) {
                    setLabels(prev => prev.includes(selectedLabel) ? prev : [...prev, selectedLabel]);
                }
            }, [isCreating, selectedLabel]);

            const reset = () => { setTitle(''); if (contentRef.current) contentRef.current.innerHTML = ''; setItems([]); setColor('default'); setLabels([]); };
            const handleSave = () => {
                const content = contentRef.current ? contentRef.current.innerHTML : '';
                if (!title.trim() && !content.trim() && items.length === 0) { setIsCreating(false); return; }
                onSave({ title, content, items, color, labels });
                reset(); setIsCreating(false);
            };

            const toggleLabel = (l) => setLabels(prev => prev.includes(l) ? prev.filter(x => x !== l) : [...prev, l]);
            const format = (cmd, val) => { document.execCommand(cmd, false, val); if (contentRef.current) contentRef.current.focus(); };
            const insertEmoji = (emoji) => {
                if (contentRef.current) {
                    contentRef.current.focus();
                    document.execCommand('insertText', false, emoji);
                }
            };

            const content = (
                <div className={`${isCreating ? 'max-w-[600px] w-full animate-pop' : 'max-w-[600px] mx-auto w-full relative z-10'}`}>
                    <div className={`glass rounded-xl shadow-lg border transition-all duration-300 ${isLightMode ? 'border-gray-200' : 'border-white/10'} ${isCreating ? 'ring-1 ring-black/5 note-color-' + color : ''}`}>
                        {!isCreating ? (
                            <div className="p-4 flex items-center justify-between cursor-text" onClick={() => setIsCreating(true)}>
                                <span className="text-sm font-medium opacity-50">Take a note...</span>
                                <div className="flex items-center gap-2">
                                    <button className="p-2 hover:bg-black/5 rounded-full text-gray-400" onClick={(e) => { e.stopPropagation(); setIsCreating(true); setItems([{ type: 'task', text: '', checked: false }]); }}><Icon name="list-checks" size={20} /></button>
                                </div>
                            </div>
                        ) : (
                            <div className="p-4 space-y-3 animate-pop">
                                <input autoFocus className="w-full bg-transparent border-none outline-none font-medium text-lg" placeholder="Title" value={title} onChange={e => setTitle(e.target.value)} />
                                <RichToolbar onFormat={format} onEmoji={insertEmoji} onTypeChange={() => setItems([...items, { type: 'task', text: '', checked: false }])} />
                                <div className="space-y-1">
                                    <div ref={contentRef} contentEditable className="rich-content text-sm w-full" data-placeholder="Take a note..." />
                                </div>
                                {items.length > 0 && (
                                    <div className="space-y-2 mt-2 pt-2 border-t border-black/5">
                                        {items.map((item, idx) => (
                                            <div key={idx} className="flex items-center gap-2">
                                                <button onClick={() => { const n = [...items]; n[idx].checked = !n[idx].checked; setItems(n); }}>
                                                    <Icon name={item.checked ? "check-square" : "square"} size={16} className={item.checked ? "text-indigo-500" : "opacity-40"} />
                                                </button>
                                                <input
                                                    className={`bg-transparent outline-none flex-1 text-sm ${item.checked ? 'line-through opacity-50' : ''}`}
                                                    value={item.text}
                                                    placeholder="Task..."
                                                    onChange={e => { const n = [...items]; n[idx].text = e.target.value; setItems(n); }}
                                                    onKeyDown={e => {
                                                        if (e.key === 'Enter') {
                                                            e.preventDefault();
                                                            const n = [...items];
                                                            n.splice(idx + 1, 0, { type: 'task', text: '', checked: false });
                                                            setItems(n);
                                                            setTimeout(() => e.target.closest('.space-y-2').querySelectorAll('input')[idx + 1]?.focus(), 0);
                                                        } else if (e.key === 'Backspace' && !item.text) {
                                                            e.preventDefault();
                                                            const n = items.filter((_, i) => i !== idx);
                                                            setItems(n);
                                                            setTimeout(() => e.target.closest('.space-y-2')?.querySelectorAll('input')[idx - 1]?.focus(), 0);
                                                        }
                                                    }}
                                                />
                                                <button onClick={() => setItems(items.filter((_, i) => i !== idx))}><Icon name="x" size={14} className="opacity-20 hover:opacity-100" /></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="flex items-center justify-between pt-2">
                                    <div className="flex items-center gap-2">
                                        <ColorPickerBtn selected={color} onSelect={setColor} colors={NOTE_COLORS} />
                                        <LabelSelector currentLabels={labels} onToggle={toggleLabel} allLabels={allLabels} />
                                    </div>
                                    <div className="flex gap-2">
                                        <button className="px-6 py-2 text-sm font-bold rounded-xl hover:bg-black/5 transition-colors opacity-70 hover:opacity-100" onClick={handleSave}>Close</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            if (isCreating) {
                return (
                    <div className="note-creator-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) handleSave(); }}>
                        {content}
                    </div>
                );
            }

            return content;
        };

        const EditorModal = ({ note, onClose, onSave, onDelete, allLabels }) => {
            const [title, setTitle] = useState(note.title || '');
            const contentRef = useRef(null);
            const [items, setItems] = useState(note.items || []);
            const [color, setColor] = useState(note.color || 'default');
            const [labels, setLabels] = useState(note.labels || []);
            const [pinned, setPinned] = useState(note.pinned || false);
            const listRef = useRef(null);

            useEffect(() => {
                if (contentRef.current) contentRef.current.innerHTML = note.content || '';
                if (listRef.current) {
                    if (note.sortable) note.sortable.destroy();
                    note.sortable = new Sortable(listRef.current, {
                        animation: 150,
                        handle: '.drag-handle',
                        ghostClass: 'sortable-ghost',
                        onEnd: (evt) => {
                            const newItems = [...items];
                            const [moved] = newItems.splice(evt.oldIndex, 1);
                            newItems.splice(evt.newIndex, 0, moved);
                            setItems(newItems);
                        }
                    });
                }
            }, [note.id]);

            const handleSave = () => { onSave({ ...note, title, content: contentRef.current ? contentRef.current.innerHTML : '', items, color, labels, pinned }); onClose(); };
            const toggleLabel = (l) => setLabels(prev => prev.includes(l) ? prev.filter(x => x !== l) : [...prev, l]);
            const format = (cmd, val) => { document.execCommand(cmd, false, val); if (contentRef.current) contentRef.current.focus(); };
            const insertEmoji = (emoji) => {
                if (contentRef.current) {
                    contentRef.current.focus();
                    document.execCommand('insertText', false, emoji);
                }
            };

            const handleLock = () => {
                if (note.locked) {
                    if (confirm("Remove password lock?")) onSave({ ...note, locked: false, password: '' });
                } else {
                    const pass = prompt("Enter password to lock this note:");
                    if (pass) onSave({ ...note, locked: true, password: pass });
                }
                onClose();
            };

            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
                    onMouseDown={(e) => { if (e.target === e.currentTarget) handleSave(); }}>
                    <div className={`glass max-w-2xl w-full rounded-2xl p-6 space-y-4 animate-pop shadow-2xl note-color-${color || 'default'} border border-white/10`} onClick={e => e.stopPropagation()} onMouseDown={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center opacity-40 text-[10px] font-bold uppercase tracking-widest pb-2">
                            <span>Editing Note</span>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setPinned(!pinned)} className={pinned ? "text-indigo-500" : ""}><Icon name="pin" size={14} /></button>
                            </div>
                        </div>
                        <input className="w-full bg-transparent border-none outline-none font-bold text-xl" value={title} onChange={e => setTitle(e.target.value)} placeholder="Title" />
                        <RichToolbar onFormat={format} onEmoji={insertEmoji} onTypeChange={() => setItems([...items, { type: 'task', text: '', checked: false, indent: 0 }])} />
                        <div className="space-y-1">
                            <div ref={contentRef} contentEditable className="rich-content min-h-[100px] text-base w-full overflow-y-auto" />
                        </div>
                        <div className="space-y-2 max-h-[300px] overflow-y-auto custom-scrollbar p-1" ref={listRef}>
                            {items.map((item, idx) => (
                                <div key={idx} className="flex items-center gap-2 group/item" style={{ marginLeft: `${(item.indent || 0) * 24}px` }}>
                                    <div className="drag-handle opacity-0 group-hover/item:opacity-30 cursor-grab px-1"><Icon name="grip-vertical" size={14} /></div>
                                    <button onClick={() => { const n = [...items]; n[idx].checked = !n[idx].checked; setItems(n); }}>
                                        <Icon name={item.checked ? "check-square" : "square"} className={item.checked ? "text-indigo-500" : "opacity-40"} />
                                    </button>
                                    <input
                                        className={`bg-transparent outline-none flex-1 py-1 ${item.checked ? 'line-through opacity-50' : ''}`}
                                        value={item.text}
                                        onChange={e => { const n = [...items]; n[idx].text = e.target.value; setItems(n); }}
                                        onKeyDown={e => {
                                            if (e.key === 'Enter') {
                                                e.preventDefault();
                                                const n = [...items];
                                                n.splice(idx + 1, 0, { type: 'task', text: '', checked: false, indent: item.indent || 0 });
                                                setItems(n);
                                                setTimeout(() => e.target.closest('.space-y-2').querySelectorAll('input')[idx + 1]?.focus(), 0);
                                            } else if (e.key === 'Tab') {
                                                e.preventDefault();
                                                const n = [...items];
                                                if (e.shiftKey) n[idx].indent = Math.max(0, (n[idx].indent || 0) - 1);
                                                else n[idx].indent = Math.min(4, (n[idx].indent || 0) + 1);
                                                setItems(n);
                                            } else if (e.key === 'Backspace' && !item.text) {
                                                e.preventDefault();
                                                if (item.indent > 0) {
                                                    const n = [...items]; n[idx].indent--; setItems(n);
                                                } else {
                                                    setItems(items.filter((_, i) => i !== idx));
                                                    setTimeout(() => e.target.closest('.space-y-2').querySelectorAll('input')[idx - 1]?.focus(), 0);
                                                }
                                            }
                                        }}
                                    />
                                    <button onClick={() => setItems(items.filter((_, i) => i !== idx))} className="opacity-0 group-hover/item:opacity-40 hover:!opacity-100"><Icon name="trash-2" size={16} /></button>
                                </div>
                            ))}
                            <button className="flex items-center gap-2 opacity-50 text-sm pl-8 pt-2 hover:opacity-100" onClick={() => setItems([...items, { type: 'task', text: '', checked: false, indent: 0 }])}><Icon name="plus" size={14} /> Add item</button>
                        </div>
                        <div className="flex items-center justify-between pt-4 border-t border-black/5">
                            <div className="flex items-center gap-3">
                                <ColorPickerBtn selected={color} onSelect={setColor} colors={NOTE_COLORS} />
                                <LabelSelector currentLabels={labels} onToggle={toggleLabel} allLabels={allLabels} />
                                <button className={`p-2 ${note.locked ? 'text-indigo-400' : 'text-gray-400'}`} onClick={handleLock} title="Lock Note"><Icon name={note.locked ? "lock" : "unlock"} /></button>
                                <button className="p-2 text-red-400" onClick={() => onDelete(note.id)}><Icon name="trash-2" /></button>
                            </div>
                            <button className="px-6 py-2 text-sm font-bold rounded-xl hover:bg-black/5 transition-colors opacity-70 hover:opacity-100" onClick={handleSave}>Close</button>
                        </div>
                    </div>
                </div>
            );
        };

        const NoteCard = ({ note, onEdit, onTogglePin, onToggleCheck }) => {
            const rowSpan = useMemo(() => {

                                                    <input placeholder="Host (e.g. 0.peerjs.com)" className="w-full bg-black/20 p-2 rounded-lg border border-white/5 text-xs text-indigo-400" value={pendingEncConfig.p2pHost || ''} onChange={e => setPendingEncConfig({ ...pendingEncConfig, p2pHost: e.target.value })} />
                                                    <div className="grid grid-cols-2 gap-2">
                                                        <input placeholder="Port" type="number" className="bg-black/20 p-2 rounded-lg border border-white/5 text-xs" value={pendingEncConfig.p2pPort || ''} onChange={e => setPendingEncConfig({ ...pendingEncConfig, p2pPort: parseInt(e.target.value) || 443 })} />
                                                        <input placeholder="Path" className="bg-black/20 p-2 rounded-lg border border-white/5 text-xs" value={pendingEncConfig.p2pPath || '/'} onChange={e => setPendingEncConfig({ ...pendingEncConfig, p2pPath: e.target.value })} />
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="p-4 bg-indigo-500/5 rounded-[1.5rem] border border-indigo-500/10 space-y-2">
                                        <div className="flex items-center justify-between px-1">
                                            <label className="text-[10px] uppercase font-bold text-indigo-400 tracking-widest">Vault Master Lock</label>
                                            <button
                                                onClick={() => {
                                                    if (!tempPass && !(Database.isLocked || Database.encryptedConfig)) {
                                                        alert("Please set a Universal Password first to enable the Master Lock.");
                                                        return;
                                                    }
                                                    const isEnabling = !(Database.isLocked || Database.encryptedConfig);
                                                    Database.lock(isEnabling ? tempPass : '');
                                                    alert(isEnabling ? "Master Lock Updated." : "Master Lock Disabled.");
                                                    setNotes(vals => [...vals]); // Trigger re-render
                                                }}
                                                className={`w-12 h-6 rounded-full relative transition-all ${(Database.isLocked || Database.encryptedConfig) ? 'bg-indigo-600' : 'bg-gray-600'}`}
                                            >
                                                <div className={`absolute top-1 w-4 h-4 rounded-full bg-white transition-all ${(Database.isLocked || Database.encryptedConfig) ? 'left-7' : 'left-1'}`} />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                            {view === 'DATA' && (
                                <div className="space-y-3">
                                    <button onClick={() => {
                                        const exportData = {
                                            vault: vaultName,
                                            config: Database.config,
                                            payload: localStorage.getItem(Database.storageKeyPath)
                                        };
                                        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a');
                                        a.href = url;
                                        a.download = `keep_mesh_${vaultName}_${new Date().toISOString().split('T')[0]}.json`;
                                        a.click();
                                        URL.revokeObjectURL(url);
                                    }} className="w-full py-3 bg-white/5 rounded-xl border border-white/5 flex items-center justify-center gap-2">
                                        <Icon name="download" /> Export Encrypted Backup
                                    </button>
                                    <button onClick={async () => {
                                        const exportData = {
                                            vault: vaultName,
                                            config: Database.config,
                                            payload: localStorage.getItem(Database.storageKeyPath)
                                        };
                                        // Google Drive logic placeholder
                                        alert("Google Drive Backup: Initialization...\nPlease ensure you have a Client ID configured in the source code or use the 'Export' button for local backup.");
                                        // Real implementation would use gapi.client.drive.files.create
                                    }} className="w-full py-3 bg-indigo-500/10 text-indigo-400 rounded-xl border border-indigo-500/20 flex items-center justify-center gap-2">
                                        <Icon name="cloud" /> Backup to Google Drive
                                    </button>
                                    <div className="relative">
                                        <button className="w-full py-3 bg-white/5 rounded-xl border border-white/5 flex items-center justify-center gap-2">
                                            <Icon name="upload" /> Import Backup
                                        </button>
                                        <input type="file" accept=".json" onChange={(e) => {
                                            const file = e.target.files[0];
                                            if (!file) return;
                                            const reader = new FileReader();
                                            reader.onload = (event) => {
                                                try {
                                                    const imported = JSON.parse(event.target.result);
                                                    if (!imported.payload) throw new Error("Invalid backup format");
                                                    let decryptedPayload = null;
                                                    const algo = imported.config?.storageAlgo || 'NONE';
                                                    if (algo !== 'NONE') {
                                                        const pass = prompt(`Enter password for ${algo} decryption:`);
                                                        if (!pass) return;
                                                        decryptedPayload = CryptoLayer.decrypt(imported.payload, algo, pass);
                                                    } else { decryptedPayload = JSON.parse(imported.payload); }
                                                    if (decryptedPayload) {
                                                        if (confirm("Data decrypted successfully. Overwrite local vault?")) {
                                                            Database.config = imported.config;
                                                            Database.addSet = decryptedPayload.addSet || {};
                                                            Database.removeSet = decryptedPayload.removeSet || {};
                                                            Database.save();
                                                            window.location.reload();
                                                        }
                                                    } else { alert("Decryption failed. Incorrect password or corrupt file."); }
                                                } catch (err) { alert("Error importing file: " + err.message); }
                                            };
                                            reader.readAsText(file);
                                        }} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    </div>
                                </div>
                            )}
                            {view === 'RESET' && (
                                <div className="space-y-4">
                                    <p className="text-xs text-red-400">Type "reset" to confirm deletion of ALL data.</p>
                                    <input className="w-full bg-black/20 p-3 rounded-xl border border-red-500/20" value={resetPhrase} onChange={e => setResetPhrase(e.target.value)} placeholder="reset" />
                                    <button onClick={handleReset} className="w-full py-3 bg-red-600 rounded-xl font-bold">Factory Reset</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div >
            );
        };

        const LockScreen = ({ onUnlock }) => {
            const [pass, setPass] = useState('');
            const [error, setError] = useState(false);
            const handleSubmit = (e) => {
                e.preventDefault();
                if (Database.unlock(pass)) onUnlock();
                else { setError(true); setPass(''); }
            };
            return (
                <div className="fixed inset-0 z-[300] bg-[#202124] flex items-center justify-center p-4">
                    <div className="max-w-sm w-full space-y-8 text-center animate-pop">
                        <div className="w-20 h-20 bg-indigo-500/10 rounded-3xl flex items-center justify-center mx-auto text-indigo-500 shadow-2xl">
                            <Icon name="lock" size={40} />
                        </div>
                        <div className="space-y-2">
                            <h2 className="text-2xl font-bold">Vault Locked</h2>
                            <p className="text-sm opacity-50">Enter your Master Password to access your notes.</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input autoFocus type="password" className={`w-full bg-white/5 p-4 rounded-2xl border ${error ? 'border-red-500' : 'border-white/10'} outline-none focus:ring-2 ring-indigo-500 transition-all text-center tracking-widest`}
                                placeholder="••••••••" value={pass} onChange={e => { setPass(e.target.value); setError(false); }} />
                            {error && <p className="text-xs text-red-500 animate-shake">Incorrect master password. Try again.</p>}
                            <button type="submit" className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-xl transition-all">Unlock Vault</button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [notes, setNotes] = useState([]);
            const [selectedNote, setSelectedNote] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [selectedLabel, setSelectedLabel] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [isLightMode, setIsLightMode] = useState(localStorage.getItem('theme') === 'light');
            const [isSyncActive, setIsSyncActive] = useState(false);
            const [vaultName, setVaultName] = useState(localStorage.getItem('mesh_vault_name') || 'MainVault');
            const [isCreating, setIsCreating] = useState(false);
            const [labels, setLabels] = useState([]);
            const [peers, setPeers] = useState([]);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isMobileSearchOpen, setIsMobileSearchOpen] = useState(false);

            const masonryPinnedRef = useRef(null);
            const masonryAllRef = useRef(null);
            const sortableInstances = useRef([]);

            const filtered = useMemo(() => {
                const unlocked = !isLocked && !!Database._masterKey;
                const lockedLabels = Database.config.lockedLabels || {};

                return notes
                    .filter(n => {
                        // Filter by selected label
                        const matchL = !selectedLabel || n.labels?.includes(selectedLabel);
                        // Filter by search
                        const matchS = !searchQuery || JSON.stringify(n).toLowerCase().includes(searchQuery.toLowerCase());

                        // Privacy logic: Hide if note has a locked label AND we aren't viewing that specific label
                        // AND the master vault is locked.
                        const isFromLockedLabel = n.labels?.some(l => {
                            if (Array.isArray(lockedLabels)) return lockedLabels.includes(l);
                            return !!lockedLabels[l];
                        });

                        const isPrivacyHidden = !selectedLabel && isFromLockedLabel && !unlocked;

                        return matchL && matchS && !isPrivacyHidden;
                    })
                    .sort((a, b) => {
                        if (a.pinned && !b.pinned) return -1;
                        if (!a.pinned && b.pinned) return 1;
                        return b.id - a.id;
                    });
            }, [notes, selectedLabel, searchQuery, isLocked, Database.config.lockedLabels]);

            const [isLocked, setIsLocked] = useState(false);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); setDeferredPrompt(e); });

                // Pequeño delay para asegurar que CryptoLayer está listo
                setTimeout(() => {
                    const params = new URLSearchParams(window.location.search);
                    let currentVault = vaultName;

                    if (params.has('vault')) {
                        currentVault = params.get('vault');
                        setVaultName(currentVault);
                        localStorage.setItem('mesh_vault_name', currentVault);
                        // Limpiar URL inmediatamente
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }

                    Database.init(currentVault, () => {
                        setNotes(Database.getAll());
                        setIsLocked(Database.isLocked);

                        if (params.has('vault')) {
                            const vPass = params.get('pass') || '';
                            const sAlgo = params.get('sa') || 'NONE';
                            const yAlgo = params.get('ya') || 'NONE';

                            // Solo configuramos si es una bóveda nueva o sin config
                            if (!localStorage.getItem(`db_config_${currentVault}`)) {
                                Database.configure({ storageAlgo: sAlgo, syncAlgo: yAlgo, syncKey: vPass });
                            }
                            localStorage.setItem('mesh_vault_pass', vPass);
                            toggleSync(true, currentVault, vPass);
                        } else if (localStorage.getItem('mesh_sync_active') === 'true') {
                            toggleSync(true, currentVault, localStorage.getItem('mesh_vault_pass'));
                        }
                    });
                }, 100);
            }, []);

            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(localStorage.getItem('sidebar_collapsed') === 'true');
            const onToggleCollapse = () => {
                const next = !isSidebarCollapsed;
                setIsSidebarCollapsed(next);
                localStorage.setItem('sidebar_collapsed', next);
            };
            const [showLabelManager, setShowLabelManager] = useState(false);

            useEffect(() => {
                const handleAddLabel = (e) => {
                    const l = e.detail;
                    const nextCustom = [...new Set([...(Database.config.customLabels || []), l])];
                    Database.configure({ customLabels: nextCustom });
                    setLabels(prev => [...new Set([...prev, l])].sort());
                };
                window.addEventListener('add-label', handleAddLabel);
                return () => window.removeEventListener('add-label', handleAddLabel);
            }, []);

            useEffect(() => {
                sortableInstances.current.forEach(s => s.destroy());
                sortableInstances.current = [];

                [masonryPinnedRef, masonryAllRef].forEach(ref => {
                    if (ref.current) {
                        const s = new Sortable(ref.current, {
                            animation: 150,
                            ghostClass: 'sortable-ghost',
                            handle: '.note-card', // Use the card itself as handle
                            onEnd: (evt) => {
                                // Future: Persist order
                            }
                        });
                        sortableInstances.current.push(s);
                    }
                });
            }, [filtered.length, selectedLabel]);

            const toggleTheme = () => setIsLightMode(!isLightMode);

            useEffect(() => {
                document.body.className = isLightMode ? 'light-theme' : '';
                localStorage.setItem('theme', isLightMode ? 'light' : 'dark');
            }, [isLightMode]);

            useEffect(() => {
                // Initialize home label if exists
                if (Database.config.homeLabel && !selectedLabel && !searchQuery) {
                    setSelectedLabel(Database.config.homeLabel);
                }
            }, [Database.config.homeLabel]);

            useEffect(() => {
                const derived = [...new Set(notes.flatMap(n => n.labels || []))];
                const custom = Database.config.customLabels || [];
                setLabels([...new Set([...derived, ...custom])].sort());
            }, [notes, Database.config.customLabels]);

            const toggleSync = (active, name, pass) => {
                if (active) {
                    Hub.initialize(name, pass, () => {
                        setPeers(Array.from(Hub.conns.entries()).map(([id, info]) => ({ id, label: info.label })));
                        setIsSyncActive(true);
                        localStorage.setItem('mesh_sync_active', 'true');
                        localStorage.setItem('mesh_vault_pass', pass || '');
                    });
                } else {
                    if (Hub.peer) Hub.peer.destroy();
                    setIsSyncActive(false);
                    localStorage.setItem('mesh_sync_active', 'false');
                }
            };

            const handleUnlock = (note) => {
                if (!note.locked) { setSelectedNote(note); return; }
                const pass = prompt("This note is locked. Enter password:");
                if (pass === note.password) setSelectedNote(note);
                else if (pass) alert("Incorrect password.");
            };

            const handleDeleteLocked = (id) => {
                const note = notes.find(n => n.id === id);
                if (note && note.locked) {
                    const pass = prompt("Delete locked note? Enter password:");
                    if (pass !== note.password) { alert("Incorrect password."); return; }
                }
                deleteNote(id);
            };

            const handleInstall = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setDeferredPrompt(null);
            };

            const [showInstallBanner, setShowInstallBanner] = useState(false);
            useEffect(() => {
                if (deferredPrompt && !localStorage.getItem('install_banner_dismissed')) {
                    setShowInstallBanner(true);
                }
            }, [deferredPrompt]);

            const upsert = (data) => {
                const id = data.id || Date.now();
                const ts = Date.now();
                Database.upsert(id, data);
                if (isSyncActive) Hub.broadcast({ addSet: { [id]: { data, ts } } });
                setNotes(Database.getAll());
            };

            const toggleCheck = (id, idx) => {
                const note = notes.find(n => n.id === id);
                if (!note || !note.items) return;
                const newItems = [...note.items];
                newItems[idx].checked = !newItems[idx].checked;
                const ts = Date.now();
                Database.upsert(id, { ...note, items: newItems });
                if (isSyncActive) Hub.broadcast({ addSet: { [id]: { data: { ...note, items: newItems }, ts } } });
                setNotes(Database.getAll());
            };

            const deleteNote = (id) => {
                const ts = Date.now();
                Database.delete(id);
                if (isSyncActive) Hub.broadcast({ removeSet: { [id]: ts } });
                setNotes(Database.getAll());
                setSelectedNote(null);
            };

            const renameLabel = (oldName, newName) => {
                const locked = Database.config.lockedLabels || {};
                const isL = Array.isArray(locked) ? locked.includes(oldName) : !!locked[oldName];

                if (isL && !Database._masterKey) {
                    const pass = prompt(`Label "${oldName}" is locked. Enter password to rename:`);
                    const correct = Array.isArray(locked) ? Database.unlock(pass) : (locked[oldName] === true ? Database.unlock(pass) : locked[oldName] === pass);
                    if (!correct) { alert("Incorrect password."); return; }
                }

                const notesToUpdate = Database.getAll().filter(n => n.labels?.includes(oldName));
                notesToUpdate.forEach(n => {
                    const newLabels = n.labels.map(l => l === oldName ? newName : l);
                    Database.upsert(n.id, { ...n, labels: newLabels });
                });

                // Update custom labels
                const custom = Database.config.customLabels || [];
                if (custom.includes(oldName)) {
                    const nextCustom = custom.map(l => l === oldName ? newName : l);
                    Database.configure({ customLabels: nextCustom });
                }

                // Handle locked labels rename (Object logic)
                if (isL) {
                    let nextLocked;
                    if (Array.isArray(locked)) {
                        nextLocked = locked.map(l => l === oldName ? newName : l);
                    } else {
                        nextLocked = { ...locked };
                        nextLocked[newName] = nextLocked[oldName];
                        delete nextLocked[oldName];
                    }
                    Database.configure({ lockedLabels: nextLocked });
                }

                if (selectedLabel === oldName) setSelectedLabel(newName);
                setNotes(Database.getAll());
            };


            const deleteLabel = (name) => {
                const locked = Database.config.lockedLabels || {};
                const isL = Array.isArray(locked) ? locked.includes(name) : !!locked[name];

                if (isL && !Database._masterKey) {
                    const pass = prompt(`Label "${name}" is locked. Enter password to delete:`);
                    if (pass === null) return;

                    let correct = false;
                    if (Array.isArray(locked)) {
                        correct = Database.unlock(pass);
                    } else {
                        const val = locked[name];
                        correct = (val === true ? Database.unlock(pass) : val === pass);
                    }

                    if (!correct) { alert("Incorrect password."); return; }
                }

                const affected = notes.filter(n => n.labels?.includes(name));
                affected.forEach(n => {
                    const newLabels = n.labels.filter(l => l !== name);
                    upsert({ ...n, labels: newLabels });
                });

                const custom = Database.config.customLabels || [];
                if (custom.includes(name)) {
                    Database.configure({ customLabels: custom.filter(l => l !== name) });
                }

                if (selectedLabel === name) setSelectedLabel(null);
            };

            const handleToggleLockLabel = (l) => {
                const current = Database.config.lockedLabels || {};
                const isAlreadyLocked = Array.isArray(current) ? current.includes(l) : !!current[l];

                if (!isAlreadyLocked) {
                    const pass = prompt(`Enter a NEW individual password for label "${l}":\n(Leave empty to use Master Password if set)`);
                    if (pass === null) return; // Cancelled

                    let newLocked;
                    if (Array.isArray(current)) {
                        newLocked = {};
                        current.forEach(name => newLocked[name] = true);
                    } else {
                        newLocked = { ...current };
                    }

                    newLocked[l] = pass || true;
                    Database.configure({ lockedLabels: newLocked });
                    alert(`Label "${l}" is now locked.`);
                } else {
                    // Check password before removing lock
                    const pass = prompt(`Enter password to UNLOCK label "${l}":`);
                    const correct = Array.isArray(current) ? Database.unlock(pass) : (current[l] === true ? Database.unlock(pass) : current[l] === pass);

                    if (correct) {
                        let newLocked;
                        if (Array.isArray(current)) {
                            newLocked = current.filter(x => x !== l);
                        } else {
                            newLocked = { ...current };
                            delete newLocked[l];
                        }
                        Database.configure({ lockedLabels: newLocked });
                    } else {
                        alert("Incorrect password. Lock NOT removed.");
                    }
                }
                setNotes(Database.getAll());
            };


            return (
                <div className="min-h-screen">
                    <header className={`desktop-header h-16 px-4 hidden lg:flex items-center justify-between border-b border-white/5 fixed top-0 right-0 z-30 glass transition-all duration-300 ${isSidebarCollapsed ? 'lg:left-20' : 'lg:left-72'} left-0`}>
                        <div className="flex items-center gap-1 min-w-0">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 hover:bg-black/10 rounded-full shrink-0 lg:hidden"><Icon name="menu" /></button>
                        </div>
                        <div className="bg-gray-500/10 focus-within:bg-gray-500/20 rounded-xl flex-1 max-w-2xl flex items-center px-4 h-11 transition-all mx-4 min-w-0 border border-transparent focus-within:border-indigo-500/30">
                            <Icon name="search" size={18} className="text-gray-400 shrink-0" />
                            <input className="bg-transparent border-none outline-none px-3 text-sm flex-1 min-w-0" placeholder="Search your notes..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                        </div>
                        <div className="flex items-center gap-1 shrink-0">
                            <button onClick={toggleTheme} className="p-2 hover:bg-black/10 rounded-full shrink-0"><Icon name={isLightMode ? "moon" : "sun"} /></button>
                            <button onClick={() => setShowSettings(true)} className="p-2 hover:bg-black/10 rounded-full shrink-0"><Icon name="settings" /></button>
                        </div>
                    </header>

                    <Sidebar isOpen={isSidebarOpen} onClose={() => setIsSidebarOpen(false)} labels={labels}
                        selectedLabel={selectedLabel} onSelectLabel={(l) => {
                            if (!l) { setSelectedLabel(null); return; }
                            const locked = Database.config.lockedLabels || {};
                            const isLabelLocked = Array.isArray(locked) ? locked.includes(l) : !!locked[l];

                            if (isLabelLocked && !Database._masterKey) {
                                const pass = prompt(`Label "${l}" is protected. Enter password:`);
                                if (pass === null) return; // Cancelled

                                let correct = false;
                                if (Array.isArray(locked)) {
                                    correct = Database.unlock(pass);
                                } else {
                                    const val = locked[l];
                                    correct = (val === true ? Database.unlock(pass) : val === pass);
                                }

                                if (correct) {
                                    setSelectedLabel(l);
                                } else {
                                    alert("Incorrect password. Access denied.");
                                }
                            } else {
                                setSelectedLabel(l);
                            }
                        }}
                        isLightMode={isLightMode}
                        deferredPrompt={deferredPrompt}
                        onInstall={handleInstall}
                        lockedLabels={Database.config.lockedLabels || {}}
                        onToggleLockLabel={handleToggleLockLabel}
                        isCollapsed={isSidebarCollapsed}
                        onToggleCollapse={onToggleCollapse}
                        onOpenLabelManager={() => setShowLabelManager(true)}
                        homeLabel={Database.config.homeLabel}
                        isUnlocked={!isLocked && !!Database._masterKey}
                        onLockVault={() => {
                            Database._masterKey = null;
                            Database.isLocked = true;
                            sessionStorage.removeItem('mesh_session_key');
                            setIsLocked(true);
                            setSelectedLabel(null);
                        }}
                    />

                    <LabelManagerModal
                        isOpen={showLabelManager}
                        onClose={() => setShowLabelManager(false)}
                        labels={labels}
                        lockedLabels={Database.config.lockedLabels || {}}
                        onToggleLockLabel={handleToggleLockLabel}
                        onRenameLabel={renameLabel}
                        onDeleteLabel={deleteLabel}
                        homeLabel={Database.config.homeLabel}
                        onSetHomeLabel={(l) => {
                            Database.configure({ homeLabel: l });
                            setNotes([...notes]);
                        }}
                    />

                    <main className={`flex-1 transition-all duration-300 ${isSidebarCollapsed ? 'lg:ml-20' : 'lg:ml-72'} min-h-screen`}>
                        {showInstallBanner && (
                            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[300] w-[90%] max-w-md animate-slideDown">
                                <div className="glass p-4 rounded-2xl border border-indigo-500/20 shadow-2xl flex items-center gap-4 bg-indigo-500/5 backdrop-blur-xl">
                                    <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/30 shrink-0">
                                        <Icon name="download-cloud" size={20} />
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-sm font-bold">Install Private Notes</p>
                                        <p className="text-[10px] opacity-60">Add to your home screen for quick access.</p>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => { setShowInstallBanner(false); localStorage.setItem('install_banner_dismissed', 'true'); }} className="p-2 opacity-40 hover:opacity-100"><Icon name="x" size={16} /></button>
                                        <button onClick={() => { handleInstall(); setShowInstallBanner(false); }} className="px-4 py-2 bg-indigo-600 text-white text-[10px] font-bold rounded-lg shadow-md hover:bg-indigo-700 transition-all">Install</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div className="max-w-6xl mx-auto px-4 py-24 space-y-6">
                            <div className="flex flex-col gap-1 mb-8">
                                <h1 className="text-4xl font-bold tracking-tight">{selectedLabel || 'All My Notes'}</h1>
                                <p className="text-gray-500 text-sm font-medium">
                                    {searchQuery ? `Search results for "${searchQuery}"` :
                                        selectedLabel ? `Showing all notes tagged with "${selectedLabel}"` :
                                            'Your personal workspace for quick thoughts and secure data.'}
                                </p>
                            </div>

                            <NoteCreator isCreating={isCreating} setIsCreating={setIsCreating} isLightMode={isLightMode} onSave={upsert} allLabels={labels} selectedLabel={selectedLabel} />

                            {filtered.some(n => n.pinned) && (
                                <React.Fragment>
                                    <div className="pin-separator text-indigo-500">
                                        <Icon name="pin" size={14} />
                                        <span className="text-[10px] font-bold uppercase tracking-widest">Pinned</span>
                                    </div>
                                    <div ref={masonryPinnedRef} className="masonry">
                                        {filtered.filter(n => n.pinned).map(n => <NoteCard key={n.id} note={n} onEdit={() => handleUnlock(n)} onTogglePin={(n) => upsert({ ...n, pinned: !n.pinned })} onToggleCheck={toggleCheck} />)}
                                    </div>
                                    <div className="pin-separator text-gray-400">
                                        <span className="text-[10px] font-bold uppercase tracking-widest">All Notes</span>
                                    </div>
                                </React.Fragment>
                            )}

                            <div ref={masonryAllRef} className="masonry">
                                {filtered.filter(n => !n.pinned).map(n => <NoteCard key={n.id} note={n} onEdit={() => handleUnlock(n)} onTogglePin={(n) => upsert({ ...n, pinned: !n.pinned })} onToggleCheck={toggleCheck} />)}
                            </div>
                        </div>
                    </main>

                    {selectedNote && <EditorModal note={selectedNote} onClose={() => setSelectedNote(null)} onSave={upsert} onDelete={handleDeleteLocked} allLabels={labels} />}

                    <SettingsModal isOpen={showSettings} onClose={() => setShowSettings(false)} isLightMode={isLightMode}
                        toggleTheme={toggleTheme} isSyncActive={isSyncActive} toggleSync={toggleSync}
                        vaultName={vaultName} setVaultName={setVaultName} peers={peers} localLabel={Database.nodeLabel}
                    />

                    <MobileSearchBar isOpen={isMobileSearchOpen} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onClose={() => setIsMobileSearchOpen(false)} />

                    <MobileBottomMenu
                        onMenu={() => setIsSidebarOpen(true)}
                        onSearch={() => setIsMobileSearchOpen(!isMobileSearchOpen)}
                        onConfig={() => setShowSettings(true)}
                        onAdd={() => setIsCreating(true)}
                        isSearchOpen={isMobileSearchOpen}
                    />

                    {isLocked && <LockScreen onUnlock={() => { setIsLocked(false); setNotes(Database.getAll()); }} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Registro de Service Worker para soporte PWA (solo en HTTPS/Localhost)
        if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.hostname === 'localhost')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Registration failed', err));
            });
        }
    </script>
</body>

</html>
